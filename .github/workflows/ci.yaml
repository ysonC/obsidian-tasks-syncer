name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint, test, build, and validate release
        run: npm run check

      - name: Audit all dependencies
        run: npm audit

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Verify required repository and release sources
        shell: bash
        run: |
          set -euo pipefail
          required_tracked_files=(
            LICENSE
            README.md
            manifest.json
            versions.json
            styles.css
            src/main.ts
            scripts/validate-release.mjs
            .github/workflows/release.yaml
          )

          for file in "${required_tracked_files[@]}"; do
            git ls-files --error-unmatch "$file" >/dev/null
            test -s "$file"
          done

          if git ls-files --error-unmatch main.js >/dev/null 2>&1; then
            echo "main.js must be generated by the build, not committed."
            exit 1
          fi
          git check-ignore --quiet main.js
